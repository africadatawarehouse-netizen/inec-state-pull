name: Today live election refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: ekiti-live-refresh
  cancel-in-progress: false

jobs:
  refresh-live-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install pandas requests openpyxl

      - name: Decide refresh cadence
        id: cadence
        shell: bash
        run: |
          first_upload_seen="$(python scripts/ekiti_refresh_status.py any-first-upload-seen --states Ekiti Enugu Kano Kebbi Nasarawa Ondo Rivers)"
          schedule="${{ github.event.schedule }}"
          should_run="true"

          if [ "${{ github.event_name }}" = "schedule" ] && [ "$schedule" = "*/10 * * * *" ] && [ "$first_upload_seen" != "true" ]; then
            should_run="false"
          fi

          if [ "${{ github.event_name }}" = "schedule" ] && [ "$schedule" = "*/30 * * * *" ] && [ "$first_upload_seen" = "true" ]; then
            should_run="false"
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "first_upload_seen=$first_upload_seen" >> "$GITHUB_OUTPUT"

      - name: Refresh live feeds from INEC
        if: steps.cadence.outputs.should_run == 'true'
        shell: bash
        run: |
          set +e
          failed=0

          refresh_state() {
            local state="$1"
            local url="$2"

            echo "::group::Refresh ${state}"
            python live_state_spooler.py --state "$state" --irev-url "$url"
            status=$?
            if [ "$status" -eq 0 ]; then
              python scripts/ekiti_refresh_status.py record --state "$state"
            else
              failed=1
              echo "::warning::${state} refresh failed with exit code ${status}; continuing so other state updates can be committed."
            fi
            echo "::endgroup::"
          }

          refresh_state "Ekiti" "https://inecelectionresults.ng/elections/6a35bb87b4e45d80b33a6e38"
          refresh_state "Enugu" "https://inecelectionresults.ng/elections/6a35c53958f677851b78ac96"
          refresh_state "Kano" "https://inecelectionresults.ng/elections/6a35c3e587b1768452f7b027"
          refresh_state "Kebbi" "https://inecelectionresults.ng/elections/6a35d6ee52574004bac51620"
          refresh_state "Nasarawa" "https://inecelectionresults.ng/elections/6a35c6ef0a25e5860383aa57"
          refresh_state "Ondo" "https://inecelectionresults.ng/elections/6a35c845f42f4600b2634026"
          refresh_state "Rivers" "https://inecelectionresults.ng/elections/6a35ca5181ddfe01b36faefd"

          if [ "$failed" -ne 0 ]; then
            echo "::warning::One or more feeds failed, but successful refreshes will still be committed."
          fi

      - name: Commit refreshed live outputs
        if: steps.cadence.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "Africa Data Warehouse Bot"
          git config user.email "actions@github.com"
          git add output/Ekiti output/Enugu output/Kano output/Kebbi output/Nasarawa output/Ondo output/Rivers
          if git diff --cached --quiet; then
            echo "No live output changes to commit."
          else
            git commit -m "Auto-refresh live election results"
            git push
          fi
